services:
    deputy-hub:
        image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/sirius/sirius-deputy-hub:latest
        build:
            dockerfile: docker/sirius-deputy-hub/Dockerfile
        ports: ["8888:8888"]
        depends_on:
            - json-server
        privileged: false
        user: app
        environment:
            PORT: 8888
            SIRIUS_URL: http://json-server:3000
            HEALTHCHECK: /supervision/deputies/health-check
            PREFIX: /supervision/deputies
            FEATURES:

    json-server:
        build:
            dockerfile: docker/json-server/Dockerfile
        ports:
            - "3000:3000"
        healthcheck:
            test: ["CMD", "curl", "-I", "-f", "http://localhost:3000"]
            interval: 2s
            timeout: 2s
            retries: 3

    go-lint:
        image: golangci/golangci-lint:v2.12.2@sha256:5cceeef04e53efe1470638d4b4b4f5ceefd574955ab3941b2d9a68a8c9ad5240
        working_dir: /go/src/app
        volumes:
            - ./:/go/src/app
            - ./.cache/golangci-lint/v2.2.1:/root/.cache
        command: golangci-lint run -v --timeout 5m

    gosec:
        image: securego/gosec:2.24.6@sha256:2cf71ea78210c496c65e3a987576a9c8317b68e20f2960520b3f6f8f9f539be5
        working_dir: /app
        volumes:
            - .:/app
        command: -exclude-dir=.gocache -fmt=sarif -out=/app/test-results/gosec.sarif -stdout -verbose=text /app/...

    yarn:
        image: node:24.14.0-alpine3.23@sha256:7fddd9ddeae8196abf4a3ef2de34e11f7b1a722119f91f28ddf1e99dcafdf114
        working_dir: /home/node/app
        entrypoint: yarn
        volumes:
            - ./:/home/node/app

    test-runner:
        build:
            context: docker/test-runner/
        command: gotestsum --junitfile test-results/unit-tests.xml -- ./... -coverprofile=test-results/test-coverage.txt
        working_dir: /go/src/app
        volumes:
            - ./:/go/src/app
            - ./.gocache:/go/pkg/mod

    cypress:
        build:
            dockerfile: docker/cypress/Dockerfile
        command: ["--headless", "-b", "chrome"]
        volumes:
            - ./cypress/screenshots:/root/cypress/screenshots:rw,delegated
            - ./cypress/logs:/root/cypress/logs:rw,delegated
        depends_on:
            - deputy-hub
            - json-server
